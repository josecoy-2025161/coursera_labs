<html>
<head>
  <title>Calculadora de Area de Rectangulo</title>
</head>
<body>
  <h1>Calculadora de Area de Rectangulo</h1>
  <label for="length">Ingresa la longitud: </label>
  <input type="number" id="length"><br><br>

  <label for="width">Ingresa el ancho: </label>
  <input type="number" id="width"><br><br>

  <button onclick="calculateArea()">Calcular Area</button><br><br>

  <p id="result"></p>

  <h1>Calculadora de Comestibles</h1>
  <label for="comestible1">Ingrese el total del Primer Comestible: </label>
  <input type="number" id="comestible1"><br><br>

  <label for="comestible2">Ingrese el total del Segundo Comestible: </label>
  <input type="number" id="comestible2"><br><br>

  <label for="comestible3">Ingrese el total del Tercer Comestible: </label>
  <input type="number" id="comestible3"><br><br>

  <button onclick="calcularTotal()">Calcular Total de Compra</button><br><br>

  <p id="totalCompra"></p>
<script src="./calculate_Area.js"></script>
</body>
</html>
